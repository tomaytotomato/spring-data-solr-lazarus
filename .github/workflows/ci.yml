name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn clean verify -pl solr-spring-boot-autoconfigure,solr-spring-boot-starter --batch-mode

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: solr-spring-boot-autoconfigure/target/site/jacoco/

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/master'
        run: |
          COVERAGE=$(grep -oP 'Total.*?([0-9]{1,3})%' solr-spring-boot-autoconfigure/target/site/jacoco/index.html | grep -oP '[0-9]{1,3}%' | head -1 || echo "N/A")
          echo "Coverage: $COVERAGE"
