spring:
  application:
    name: solr-sample
  docker:
    compose:
      lifecycle-management: start-and-stop
      file: solr-spring-boot-sample/docker-compose.yml
      readiness:
        wait: always
  solr:
    host: http://localhost:8983/solr
    default-collection: books

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    solr:
      enabled: true
